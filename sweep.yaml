# W&B sweep — STAGE B: labor-division + capacity coefs, WITH the diversity loss active.
#
# Run AFTER Stage A (sweep_div.yaml). div-coef / div-spread-center are FIXED at the Stage-A
# winner (UPDATE the two placeholders below before launching). This stage re-validates the
# reward/capacity coefficients now that the div-loss is carrying the division — the prior
# sweep gh3qj58r tuned these WITHOUT it, so its winner (summer-6) is not trustworthy here.
#
# Regime = same as Stage A (positions shared, fusion OFF, --comm-range 8) so the division
# mechanism is the validated one and trials are comparable to Stage A. Commitment OFF.
#
# What it tunes:
#   novel-scan-weight — per-agent privileged team-union novel-cell credit (the core coverage
#                       driver). Trades coverage speed against the div-loss's separation pull.
#   team-weight       — shared Δunion cooperation anchor (gh3qj58r: ≈0.4 helped fairness).
#   target-switch-pen — anti-oscillation deliberation cost on genuine branch flips.
#   n-hops            — ego encoder window radius {2,4,6}. gh3qj58r liked 6, but run_div
#                       validated the div-loss at 2 — re-decide it here under the div-loss.
#
# Metric = eval/score on the fixed 8-map suite (auc − 0.5·imbalance − 0.25·overlap −
# 0.25·idle). Watch eval/concurrency + eval/idle_rate_max (both-active / laziest-agent idle).
#
# Usage (inside the marlauder container):
#   wandb sweep sweep.yaml                    → SWEEP_ID
#   wandb agent <ENTITY/PROJECT/SWEEP_ID>     (one agent per machine/GPU)

program: scripts/run_train.py
method: bayes
metric:
  name: eval/score
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 3
  eta: 2

command:
  - ${env}
  - python
  - ${program}
  - --split=train/easy
  - --n-envs=32          # minibatch=1 at n_hops=6 OOMs >32 envs on a 16GB GPU (verified)
  - --n-agents=2
  - --comm-range=8                    # fusion OFF (match Stage A): division from position
  - --force-full-pos-sharing
  - --rollout-len=256
  - --max-episode-steps=256
  - --total-steps=2000000
  - --lr=0.0003
  - --ent-coef=0.005
  - --clip-eps=0.2
  - --k-epochs=2
  - --gae-lambda=0.95
  - --gamma=0.99
  - --minibatches=1
  - --max-steps-on-option=0           # commitment OFF
  # ---- diversity loss FIXED at the Stage-A winner — UPDATE these two placeholders ----
  - --div-coef=0.5
  - --div-spread-center=0.20
  # ------------------------------------------------------------------------------------
  - --compile
  - --wandb
  - --wandb-project=marlauder-div
  - ${args}

# Keys MUST be exact dashed CLI flags (W&B expands ${args} as --<key>=<value>).
parameters:
  novel-scan-weight:
    distribution: uniform
    min: 0.5
    max: 2.0
  team-weight:
    distribution: uniform
    min: 0.0
    max: 0.5
  target-switch-pen:
    distribution: uniform
    min: 0.0
    max: 0.1
  n-hops:
    values: [2, 4, 6]
