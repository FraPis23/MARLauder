# W&B sweep v2 — STAGE 1: division of labor under perfect information.
#
# Trials run with --force-full-occupancy-sharing --force-full-pos-sharing: maps fuse every
# step, so the rendezvous reward terms (give/recv/overlap, baselined at last meeting)
# degenerate to ~0 and the privileged novel-scan credit is the ONLY per-agent channel —
# the sweep isolates pure division-of-labor coefficients.
#
# Metric = eval/score, computed on the FIXED 8-map eval suite (train/driver.py
# EVAL_MAP_IDX) with a deterministic policy every 10 iters:
#   eval/score = coverage_auc − 0.5·contrib_imbalance − 0.25·sensing_overlap
# Same maps + no sampling noise → cross-trial scores actually comparable.
#
# MAPPO frozen (sweep v1: no signal across lr/clip/λ/γ; k_epochs=6 caused KL blowups):
#   lr 3e-4, ent-coef 0.005, clip-eps 0.2, k-epochs 10 (Yu et al. Suggestion 3: 10-15 epochs;
#   raised from 4 now the teleport-env KL blowups are gone + NaN guard protects), γ.99, λ.95,
#   minibatches 1 (Yu et al. 2022 "Surprising Effectiveness of PPO in MARL", Suggestion 3:
#   1 minibatch won 22/23 SMAC maps; >1 hurts), tbptt 16.
#
# Usage (inside the marlauder container):
#   wandb sweep sweep.yaml          → SWEEP_ID
#   wandb agent <ENTITY/PROJECT/SWEEP_ID>     (one agent per machine/GPU)

program: scripts/run_train.py
method: bayes
metric:
  name: eval/score
  goal: maximize

# Hyperband over eval/score history (logged every 10 train iters → 1 "iter" here ≈ 10
# train iters). min_iter 3 ≈ train iter 30: weak configs die early.
early_terminate:
  type: hyperband
  min_iter: 3
  eta: 2

command:
  - ${env}
  - python
  - ${program}
  - --split=train/easy
  - --n-envs=32          # minibatch=1 at n_hops=6 OOMs >32 envs on a 16GB GPU (verified)
  - --n-agents=2
  - --rollout-len=256
  - --max-episode-steps=256
  - --total-steps=2000000
  - --force-full-occupancy-sharing
  - --force-full-pos-sharing
  - --lr=0.0003
  - --ent-coef=0.005
  - --clip-eps=0.2
  - --k-epochs=2
  - --gae-lambda=0.95
  - --gamma=0.99
  - --minibatches=1
  - --compile
  - --wandb
  - --wandb-project=marlauder-sweep2
  - ${args}

# Keys MUST be exact dashed CLI flags (W&B expands ${args} as --<key>=<value>).
parameters:
  novel-scan-weight:
    distribution: uniform
    min: 0.5
    max: 2.0
  team-weight:
    distribution: uniform
    min: 0.0
    max: 0.5
  # proximity-pen ELIMINATED (the ping-pong/deadlock driver) — fixed at 0 via run_train default;
  # no longer swept. Division is handled by novel_scan + target-claim + (Phase 2) surplus obs.
  target-switch-pen:                 # graph-tree branch-flip commitment penalty (now the
    distribution: uniform            # anti-oscillation knob; raised range, default 0.05)
    min: 0.0
    max: 0.1
  n-hops:
    values: [2, 4, 6]
