services:
  marlauder:
    build:
      context: .
      dockerfile: docker/Dockerfile
    image: marlauder:latest
    container_name: marlauder
    # Monta l'intero Thesis_Project: il container vede sia MARLauder
    # sia IR2-Multi-Robot-RL-Exploration (per le DungeonMaps / benchmark).
    volumes:
      - ..:/workspace
      - warp-cache:/root/.cache/warp
    working_dir: /workspace/MARLauder
    # GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    # shared memory ampia per torch dataloader / multiprocessing
    ipc: host
    shm_size: "8gb"
    ports:
      - "8080:8080"
    stdin_open: true
    tty: true
    # Web UI: index at http://localhost:8080/ lists all runs; each run's inspector at
    # http://localhost:8080/<run_name>/inspector.html  (traces/index.json resolves relatively).
    command: >
      bash -c "python viz/web_server.py &
               sleep infinity"

volumes:
  warp-cache:
