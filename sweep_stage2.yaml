# W&B sweep v2 — STAGE 2: rendezvous economy under realistic comm (range 120 px + LOS).
#
# Run AFTER Stage 1 (sweep.yaml). Paste the Stage-1 winner values for the labor-division
# coefficients below (marked WINNER), then sweep only the comm-gated rendezvous knobs
# that were inert under full sharing: give/recv bonuses + overlap penalty.
# overlap-pen range is LOWER than v1 ([0.5, 3]) because novel-scan already zero-pays
# redundant cells — overlap at rendezvous is now a second tax on the same behavior.
#
# Metric identical to Stage 1 (eval/score on the fixed 8-map suite); comm_duty_cycle is
# meaningful again here — watch it fall mid-episode (split) and spike at rendezvous.

program: scripts/run_train.py
method: bayes
metric:
  name: eval/score
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 3
  eta: 2

command:
  - ${env}
  - python
  - ${program}
  - --split=train/easy
  - --n-envs=64
  - --n-agents=2
  - --comm-range=120
  - --rollout-len=256
  - --max-episode-steps=256
  - --total-steps=2000000
  - --lr=0.0003
  - --ent-coef=0.005
  - --clip-eps=0.2
  - --k-epochs=4
  - --gae-lambda=0.95
  - --gamma=0.99
  - --minibatches=4
  # ---- WINNER values from Stage 1 — EDIT BEFORE LAUNCH ----
  - --novel-scan-weight=1.0
  - --team-weight=0.3
  - --proximity-pen=0.05
  - --target-switch-pen=0.01
  - --n-hops=2
  # ---------------------------------------------------------
  - --compile
  - --wandb
  - --wandb-project=marlauder-sweep2
  - ${args}

parameters:
  overlap-pen:
    distribution: uniform
    min: 0.5
    max: 3.0
  give-bonus:
    distribution: uniform
    min: 0.5
    max: 3.0
  recv-bonus:
    distribution: uniform
    min: 0.0
    max: 1.5
