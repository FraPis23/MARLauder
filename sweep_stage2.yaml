# W&B sweep v2 — STAGE 2 (D3): MAP-DIVERGENT coordination, positions still shared.
#
# Decentralization step 1: drop occupancy sharing, KEEP position sharing
# (--force-full-pos-sharing). Maps now diverge → the rendezvous terms (give/recv/overlap,
# baselined at last meeting) go LIVE, and teammate-distance BF relies on the D1 optimistic
# graph (teammate often sits in this agent's UNKNOWN region). Exact positions isolate
# "coordinate with divergent maps" from "estimate where the teammate is" (that's step 2,
# below — drop --force-full-pos-sharing then).
#
# Run AFTER Stage 1 (sweep.yaml). Winner labor-division coefs are pasted below (summer-6);
# sweep only the comm-gated rendezvous knobs that were inert under full sharing:
# give/recv bonuses + overlap penalty. overlap-pen range is LOWER ([0.5, 3]) because
# novel-scan already zero-pays redundant cells — overlap is a second tax on the same thing.
#
# Metric identical to Stage 1 (eval/score on the fixed 8-map suite; D2: equity normalized,
# now a first-class term). comm_duty is NOT meaningful here (positions force-shared); it
# becomes meaningful in step 2 (realistic position) — watch it fall mid-episode, spike at
# rendezvous there.

program: scripts/run_train.py
method: bayes
metric:
  name: eval/score
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 3
  eta: 2

command:
  - ${env}
  - python
  - ${program}
  - --split=train/easy
  - --n-envs=32          # minibatch=1 at n_hops=6 OOMs >32 envs on a 16GB GPU (verified)
  - --n-agents=2
  - --comm-range=120
  - --force-full-pos-sharing          # step 1: positions shared, maps NOT (drop for step 2)
  - --rollout-len=256
  - --max-episode-steps=256
  - --total-steps=2000000
  - --lr=0.0003
  - --ent-coef=0.005
  - --clip-eps=0.2
  - --k-epochs=4
  - --gae-lambda=0.95
  - --gamma=0.99
  - --minibatches=1
  # ---- WINNER from Stage 1 sweep gh3qj58r — summer-sweep-6 (FIXED env, score 0.528,
  #      fairness 0.944, success 62.5%; n_hops=6 + team≈0.4 dominated the top) ----
  - --novel-scan-weight=1.50
  - --team-weight=0.405
  - --proximity-pen=0.0      # ELIMINATED (deadlock driver); division via novel_scan + target-claim
  - --target-switch-pen=0.05 # graph-tree commitment (raised from 0.017)
  - --n-hops=6
  # ------------------------------------------------------------------------------
  - --compile
  - --wandb
  - --wandb-project=marlauder-sweep2
  - ${args}

parameters:
  overlap-pen:
    distribution: uniform
    min: 0.5
    max: 3.0
  give-bonus:
    distribution: uniform
    min: 0.5
    max: 3.0
  recv-bonus:
    distribution: uniform
    min: 0.0
    max: 1.5
