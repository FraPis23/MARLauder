# W&B sweep — STAGE C: REALISTIC intermittent comm + rendezvous, div-loss carried forward.
#
# Run AFTER Stage B. This is the decentralization step: --comm-range=120 so maps fuse only
# when agents are actually in range (intermittent), and the rendezvous terms (give/recv/
# overlap, baselined at last meeting) go LIVE. Teammate-distance BF relies on the D1
# optimistic graph (teammate often sits in this agent's UNKNOWN region).
#
#   Step 1 (THIS file): --force-full-pos-sharing → positions exact, maps diverge. Isolates
#                       "coordinate + rendezvous with divergent maps" from "estimate where the
#                       teammate is".
#   Step 2 (later):     DROP --force-full-pos-sharing → realistic position. This is where the
#                       teammate-POSITION ESTIMATOR plugs in (user designs it). The div-loss
#                       and rendezvous coefs from here carry over.
#
# div-coef / div-spread-center FIXED at the Stage-A winner; labor-division coefs + n-hops
# FIXED at the Stage-B winner (UPDATE all placeholders below before launching). Commitment OFF.
#
# What it tunes (the comm-gated rendezvous knobs, inert under fusion-off Stages A/B):
#   give-bonus   — credit for NEW cells brought to the teammate at a meeting.
#   recv-bonus   — credit for NEW cells received at a meeting.
#   overlap-pen  — redundant-parallel-scan penalty at a meeting. Range LOW ([0.5,3]) because
#                  novel-scan already zero-pays redundant cells — this is a second tax on it.
#
# Metric = eval/score on the fixed 8-map suite. comm_duty becomes meaningful here (positions
# still forced in step 1; truly meaningful in step 2) — watch it fall mid-episode, spike at
# rendezvous.
#
# Usage (inside the marlauder container):
#   wandb sweep sweep_stage2.yaml             → SWEEP_ID
#   wandb agent <ENTITY/PROJECT/SWEEP_ID>     (one agent per machine/GPU)

program: scripts/run_train.py
method: bayes
metric:
  name: eval/score
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 3
  eta: 2

command:
  - ${env}
  - python
  - ${program}
  - --split=train/easy
  - --n-envs=32          # minibatch=1 at n_hops=6 OOMs >32 envs on a 16GB GPU (verified)
  - --n-agents=2
  - --comm-range=120                  # intermittent fusion (realistic)
  - --force-full-pos-sharing          # step 1: positions shared, maps NOT (drop for step 2)
  - --rollout-len=256
  - --max-episode-steps=256
  - --total-steps=2000000
  - --lr=0.0003
  - --ent-coef=0.005
  - --clip-eps=0.2
  - --k-epochs=2
  - --gae-lambda=0.95
  - --gamma=0.99
  - --minibatches=1
  - --max-steps-on-option=0           # commitment OFF
  # ---- diversity loss FIXED at Stage-A winner — UPDATE ----
  - --div-coef=0.5
  - --div-spread-center=0.20
  # ---- labor-division + capacity FIXED at Stage-B winner — UPDATE ----
  - --novel-scan-weight=1.50
  - --team-weight=0.405
  - --proximity-pen=0.0
  - --target-switch-pen=0.05
  - --n-hops=2
  # --------------------------------------------------------------------
  - --compile
  - --wandb
  - --wandb-project=marlauder-div
  - ${args}

parameters:
  overlap-pen:
    distribution: uniform
    min: 0.5
    max: 3.0
  give-bonus:
    distribution: uniform
    min: 0.5
    max: 3.0
  recv-bonus:
    distribution: uniform
    min: 0.0
    max: 1.5
