# W&B sweep — STAGE A: cross-agent DIVERSITY-LOSS tuning (J.3). RUN FIRST.
#
# Context: reactive position-driven division was just SOLVED by the train-time diversity
# loss (penalize both agents claiming the SAME frontier node, gated by candidate spread).
# runs/run_div (div-coef=0.5) hit target_yield 0.04→0.56 and beat the no-div baseline on
# coverage (auc 0.715 vs 0.651) and overlap (ov 0.19 vs 0.29). div-coef worked first try and
# is UNTUNED — this sweep finds its best value + the availability-gate center.
#
# Regime = the validation regime: positions shared exactly, occupancy fusion OFF
# (--force-full-pos-sharing --comm-range 8). This ISOLATES the mechanism — division here can
# ONLY come from reading teammate position, not from accidental map fusion. (Realistic comm
# is Stage C.) Commitment is OFF (--max-steps-on-option 0): last session proved the thrash
# was fixed by the prev_branch_match obs feature, not commitment, and commitment HURTS
# post-comm alignment. n-hops FIXED at 2 (what validated the div-loss; re-decided in Stage B).
#
# What it tunes:
#   div-coef          — weight of the collision penalty. Too low → division doesn't emerge;
#                       too high → head over-diversifies targets at the expense of coverage.
#                       THE key new knob.
#   div-spread-center — normalized candidate-spread at which the availability gate turns on.
#                       Low → penalize collisions even within a tight cluster (risks splitting
#                       a lone frontier → idle); high → only penalize when frontiers are far
#                       apart (safer, but weaker division). Controls the no-idle guarantee.
#
# Metric = eval/score on the fixed 8-map suite = auc − 0.5·imbalance − 0.25·overlap −
# 0.25·idle. It already bundles coverage + low-overlap + balance + no-idle, so maximizing it
# directly optimizes the division/coverage tradeoff. After the sweep, confirm the WINNER's
# MECHANISM offline: scripts/diag_division.py (want target_yield ≳ 0.4).
#
# Usage (inside the marlauder container):
#   wandb sweep sweep_div.yaml                → SWEEP_ID
#   wandb agent <ENTITY/PROJECT/SWEEP_ID>     (one agent per machine/GPU)

program: scripts/run_train.py
method: bayes
metric:
  name: eval/score
  goal: maximize

early_terminate:
  type: hyperband
  min_iter: 3
  eta: 2

command:
  - ${env}
  - python
  - ${program}
  - --split=train/easy
  - --n-envs=32
  - --n-agents=2
  - --comm-range=8                    # fusion OFF: division must come from position
  - --force-full-pos-sharing          # positions shared exactly
  - --rollout-len=256
  - --max-episode-steps=256
  - --total-steps=2000000
  - --lr=0.0003
  - --ent-coef=0.005
  - --clip-eps=0.2
  - --k-epochs=2
  - --gae-lambda=0.95
  - --gamma=0.99
  - --minibatches=1
  # ---- labor-division coefs FIXED at the run_div baseline (re-swept in Stage B) ----
  - --novel-scan-weight=1.50
  - --team-weight=0.405
  - --proximity-pen=0.0
  - --target-switch-pen=0.05
  - --n-hops=2
  - --max-steps-on-option=0           # commitment OFF (it hurt; thrash fixed by obs feature)
  # ----------------------------------------------------------------------------------
  - --compile
  - --wandb
  - --wandb-project=marlauder-div
  - ${args}

parameters:
  div-coef:
    distribution: uniform
    min: 0.1
    max: 2.0
  div-spread-center:
    distribution: uniform
    min: 0.10
    max: 0.40
